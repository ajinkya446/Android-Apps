name: Code Review Automation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main, master, develop ]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  # ==================== PR SIZE CHECK ====================
  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR Size
        uses: actions/github-script@v7
        with:
          script: |
            const additions = context.payload.pull_request.additions || 0;
            const deletions = context.payload.pull_request.deletions || 0;
            const totalChanges = additions + deletions;
            
            const MAX_LINES = 500;
            const WARNING_LINES = 300;
            
            let message = '';
            let conclusion = 'success';
            
            if (totalChanges > MAX_LINES) {
              message = `❌ **PR is too large!**\n\nThis PR has **${totalChanges}** changed lines (max recommended: ${MAX_LINES}).\n\nConsider splitting into smaller PRs for easier review.`;
              conclusion = 'failure';
            } else if (totalChanges > WARNING_LINES) {
              message = `⚠️ **PR is getting large**\n\nThis PR has **${totalChanges}** changed lines.\n\nConsider if this could be split into smaller chunks.`;
            } else {
              message = `✅ **PR size is good!**\n\nThis PR has **${totalChanges}** changed lines.\n\nEasy to review! 🎉`;
            }
            
            // Post comment
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
            
            // Create check run
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'PR Size Check',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: `PR Size: ${totalChanges} lines`,
                summary: message
              }
            });

  # ==================== CODE REVIEW CHECKLIST ====================
  review-checklist:
    name: Post Review Checklist
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - name: Post Review Checklist
        uses: actions/github-script@v7
        with:
          script: |
            const checklist = `## 📋 Code Review Checklist

            ### ✅ Pre-Review Checks (Automated)
            - [ ] **Code Quality Checks** - Detekt, KtLint, Lint passing
            - [ ] **Build Verification** - Compiles without errors
            - [ ] **Unit Tests** - All tests passing
            - [ ] **Unused Code** - No unused imports/resources
            
            ### 👤 Reviewer Checklist (Manual)
            **Functionality:**
            - [ ] Code works as expected
            - [ ] Edge cases handled
            - [ ] Error handling in place
            
            **Code Quality:**
            - [ ] Code is readable and maintainable
            - [ ] Naming conventions followed
            - [ ] No unnecessary complexity
            - [ ] Comments added where needed
            
            **Testing:**
            - [ ] Unit tests cover new code
            - [ ] UI tests if needed
            - [ ] Manual testing performed
            
            **Documentation:**
            - [ ] README updated if needed
            - [ ] Code comments clear
            - [ ] PR description explains changes
            
            ### 🎯 Review Outcome
            - **Approve**: All checks pass, ready to merge
            - **Request Changes**: Issues found, needs fixes
            - **Comment**: Questions or suggestions
            
            ---
            **Note**: This checklist is posted automatically. Please review each item before approving.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: checklist
            });

  # ==================== WELCOME FIRST-TIME CONTRIBUTORS ====================
  welcome-contributor:
    name: Welcome First-Time Contributors
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - name: Check if first-time contributor
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            
            // Check if this is their first PR
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });
            
            const userPRs = prs.filter(pr => pr.user.login === author);
            
            if (userPRs.length === 1) {
              const welcomeMessage = `## 🎉 Welcome, @${author}!
              
              Thank you for your first contribution to QR Scanner! We're excited to have you on board.
              
              ### Quick Tips:
              - Make sure all automated checks pass (see below)
              - Fill out the PR description template
              - Respond to review feedback promptly
              - Don't hesitate to ask questions!
              
              A maintainer will review your PR soon. 🚀`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: welcomeMessage
              });
            }

  # ==================== REVIEW REMINDER ====================
  review-reminder:
    name: Review Reminder
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - name: Request Review
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // Add reviewers based on code changes
            const changedFiles = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            
            const filePaths = changedFiles.data.map(f => f.filename);
            
            // Determine who to request review from based on files changed
            let reviewers = [];
            
            if (filePaths.some(f => f.includes('.github/workflows'))) {
              reviewers.push('CODEOWNERS');
            }
            
            // Request review from CODEOWNERS file if exists
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers: reviewers.length > 0 ? reviewers : undefined,
                team_reviewers: ['maintainers']
              });
            } catch (e) {
              console.log('Could not auto-request reviewers:', e.message);
            }

  # ==================== AUTO-LABEL PR ====================
  auto-label:
    name: Auto Label PR
    runs-on: ubuntu-latest
    steps:
      - name: Label based on changes
        uses: actions/labeler@v5
        if: false  # Disabled until .github/labeler.yml is configured
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml

      - name: Manual Labeling
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;
            const title = pr.title.toLowerCase();
            const body = (pr.body || '').toLowerCase();
            
            const labels = [];
            
            // Label based on branch name
            if (branch.startsWith('feat/') || branch.startsWith('feature/')) {
              labels.push('feature');
            } else if (branch.startsWith('fix/') || branch.startsWith('bugfix/')) {
              labels.push('bugfix');
            } else if (branch.startsWith('hotfix/')) {
              labels.push('hotfix');
            } else if (branch.startsWith('docs/')) {
              labels.push('documentation');
            } else if (branch.startsWith('refactor/')) {
              labels.push('refactoring');
            }
            
            // Label based on title
            if (title.includes('test') || title.includes('testing')) {
              labels.push('tests');
            }
            if (title.includes('dependencies') || title.includes('bump')) {
              labels.push('dependencies');
            }
            if (title.includes('workflow') || title.includes('ci/cd')) {
              labels.push('ci/cd');
            }
            
            // Add size label
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const total = additions + deletions;
            
            if (total < 50) {
              labels.push('size: small');
            } else if (total < 300) {
              labels.push('size: medium');
            } else {
              labels.push('size: large');
            }
            
            // Apply labels
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: labels
              });
              console.log('Applied labels:', labels);
            }

  # ==================== STALE PR CHECK ====================
  stale-pr-check:
    name: Stale PR Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'synchronize'
    steps:
      - name: Check for stale reviews
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // Get reviews
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            
            const approvedReviews = reviews.filter(r => r.state === 'APPROVED');
            
            if (approvedReviews.length > 0) {
              // Check if PR was updated after approval
              const lastApproval = approvedReviews[approvedReviews.length - 1];
              const lastCommit = pr.head.sha;
              const lastReviewCommit = lastApproval.commit_id;
              
              if (lastCommit !== lastReviewCommit) {
                const message = `⚠️ **Attention Reviewers**
                
                New commits have been pushed after your approval. Please re-review the changes.
                
                - Last reviewed commit: \`${lastReviewCommit.substring(0, 7)}\`
                - Current commit: \`${lastCommit.substring(0, 7)}\``;
                
                github.rest.issues.createComment({
                  issue_number: pr.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: message
                });
              }
            }

  # ==================== MERGE CONFLICT CHECK ====================
  merge-conflict-check:
    name: Merge Conflict Check
    runs-on: ubuntu-latest
    steps:
      - name: Check for merge conflicts
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            if (pr.mergeable === false) {
              const message = `❌ **Merge Conflicts Detected**
              
              This PR has merge conflicts that need to be resolved.
              
              **To resolve:**
              1. Fetch latest changes: \`git fetch origin\`
              2. Merge main: \`git merge origin/main\`
              3. Resolve conflicts
              4. Push changes: \`git push\``;
              
              github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: message
              });
              
              // Create failing check
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'Merge Conflict Check',
                head_sha: pr.head.sha,
                status: 'completed',
                conclusion: 'failure',
                output: {
                  title: 'Merge conflicts detected',
                  summary: 'Please resolve merge conflicts before merging'
                }
              });
            } else {
              // Create passing check
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'Merge Conflict Check',
                head_sha: pr.head.sha,
                status: 'completed',
                conclusion: 'success',
                output: {
                  title: 'No merge conflicts',
                  summary: 'PR is ready to merge'
                }
              });
            }
